<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Section Cat Article with Button</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap 5.3 CSS -->
  <link href="src/dev/3rd/bootstrap/bootstrap.css" rel="stylesheet">
   <link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
/>
  <link rel="stylesheet" href="src/dev/styles/main.css">
</head>

<body>

<section class="lnSection lnSection__JoinFirstSquad" style="background: var(--bg-light-2);">
    <div class="container">

        <!-- Intro -->
        <header class="lnIntro lnIntro--center">
            <div class="lnIntro__content">
                <div class="lnIntro__label text-caption-c1 font-bold">JOIN US AS FIRST SQUAD</div>
                <h2 class="lnIntro__title text-headline-h2 font-bold m-0">
                    Continuous Growth and Stability: A Grateful Journey at Linknet
                </h2>
            </div>
        </header>

        <!-- Swiper -->
        <div class="joinSquadSwiper swiper mt-4">
            <div class="swiper-wrapper">
                <!-- Slide 1 -->
                <div class="swiper-slide"
                     data-headline="Are You Ready to Become First Squad At Linknet?"
                     data-desc="At Linknet, First Squad will contribute in providing the best experience for all of our customers. Let's join a company that sees potential and supports the development of every individual in it."
                     data-cta="Join as a First Squad"
                     data-href="#first-squad">
                    <article class="firstSquadCard">
                        <img class="firstSquadCard__img" src="src/assets/photos/thumb/fs.png" alt="First Squad">
                        <div class="firstSquadCard__gradient" aria-hidden="true"></div>
                        <div class="firstSquadCard__text">
                            <small class="text-body-b4 d-block opacity-75">Become First Squad as</small>
                            <h3 class="firstSquadCard__title text-headline-h3 m-0">First Squad</h3>
                        </div>
                    </article>
                </div>

                <!-- Slide 2 -->
                <div class="swiper-slide"
                     data-headline="Management Trainee Program at Linknet"
                     data-desc="Every year, Linknet recruits the best graduates through the Management Trainee (MT) program. MT will be equipped with a comprehensive program and receive the best development program to prepare MT as future leader at PT Link Net Tbk."
                     data-cta="Join as a Management Trainee"
                     data-href="#management-trainee">
                    <article class="firstSquadCard">
                        <img class="firstSquadCard__img" src="src/assets/photos/thumb/mt.png" alt="Management Trainee">
                        <div class="firstSquadCard__gradient" aria-hidden="true"></div>
                        <div class="firstSquadCard__text">
                            <small class="text-body-b4 d-block opacity-75">Become First Squad as</small>
                            <h3 class="firstSquadCard__title text-headline-h3 m-0">Management<br/>Trainee</h3>
                        </div>
                    </article>
                </div>

                <!-- Slide 3 -->
                <div class="swiper-slide"
                     data-headline="Get Ready to Be First Squad Intern, Now!"
                     data-desc="Start your career journey as a First Squad Intern at Linknet. By becoming a First Squad Intern, you will have the opportunity to learn, contribute and develop your knowledge professionally as a preparation for your career journey ahead."
                     data-cta="See Internship Openings"
                     data-href="#first-squad-intern">
                    <article class="firstSquadCard">
                        <img class="firstSquadCard__img" src="src/assets/photos/thumb/intern.png" alt="First Squad Intern">
                        <div class="firstSquadCard__gradient" aria-hidden="true"></div>
                        <div class="firstSquadCard__text">
                            <small class="text-body-b4 d-block opacity-75">Become First Squad as</small>
                            <h3 class="firstSquadCard__title text-headline-h3 m-0">First Squad Intern</h3>
                        </div>
                    </article>
                </div>
            </div>

            <!-- Nav -->
            <div class="lnSwiperNav" aria-hidden="true">
                <button class="lnSwiperNav__btn lnSwiperNav__prev" type="button" aria-label="Previous">
                    <img src="src/assets/icons/chevron-left.svg" alt="" width="24" height="24">
                </button>
                <button class="lnSwiperNav__btn lnSwiperNav__next" type="button" aria-label="Next">
                    <img src="src/assets/icons/chevron-right.svg" alt="" width="24" height="24">
                </button>
            </div>
        </div>

        <!-- Copy + CTA (auto-sync with active slide) -->
        <div class="joinCopy text-center mt-4">
            <h3 id="joinCopyTitle" class="text-headline-h4 font-bold m-0">—</h3>
            <p id="joinCopyDesc" class="text-body-b4 text-secondary mt-2 mb-4 mx-auto joinCopy__desc">—</p>
            <a id="joinCopyCta" href="#" class="btn btn-md btn-secondary-outline">
                <span id="joinCopyCtaText">—</span>
                <img src="src/assets/icons/arrow-top-right.svg" alt="" width="16" height="16">
            </a>
        </div>
    </div>
</section>


    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
<script src="https://code.highcharts.com/maps/highmaps.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>

    <script src="src/dev/script/main.js"></script>
    <script src="src/dev/script/componets/sliders.js"></script>
    <script src="src/dev/script/componets/sections.js"></script>
    <script src="src/dev/script/componets/modals.js"></script>
    <script src="src/dev/script/componets/map.js"></script>
    <script src="src/dev/script/componets/footer.js"></script>

    <script src="src/dev/script/main.js"></script>
    <script>
        // Enable tooltips (IDX info)
        const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
        tooltipTriggerList.map(el => new bootstrap.Tooltip(el));
    </script>

</body>

</html>
