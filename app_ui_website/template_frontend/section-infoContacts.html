<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Section Cat Article with Button</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap 5.3 CSS -->
  <link href="src/dev/3rd/bootstrap/bootstrap.css" rel="stylesheet">
   <link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
/>
  <link rel="stylesheet" href="src/dev/styles/main.css">
</head>

<body>

<section class="lnSection lnSection__infoContact">
  <div class="container">

    <div class="lnSection_head mb-2">
        <div class="lnIntro lnIntro--center">
            <div class="lnIntro__content">
                <!-- <div class="lnIntro__label text-caption-c1 font-medium">OUR PURPOSE</div> -->
                <div class="lnIntro__title text-headline-h2 font-bold"> Get More Information about Linknet EnterpriseCo</div>
                <div class="lnIntro__desc text-body-b4 font-regular">
                    Have questions or need more information? Our team is here to help. Reach out to us and we’ll respond as soon as possible.
                </div>
            </div>
        </div>
    </div>

    <div class="lnSection_body">
        <div class="infoContact__grid">
            <!-- Website -->
            <a href="https://enterprise.linknet.co.id" target="_blank" rel="noopener" class="infoContact__item">
                <span class="infoContact__lead">
                <img class="infoContact__icon" src="src/assets/icons/world.svg" alt="" width="28" height="28" />
                </span>
                <span class="infoContact__text">
                <span class="text-caption-c1 text-secondary d-block">Visit Website</span>
                <span class="text-body-b4 font-medium d-block">enterprise.linknet.co.id</span>
                </span>
                <img src="src/assets/icons/arrow-top-right.svg" alt="" width="20" height="20" />
            </a>

            <!-- Call Center -->
            <a href="tel:+622129940808" class="infoContact__item">
                <span class="infoContact__lead">
                <img class="infoContact__icon" src="src/assets/icons/phone.svg" alt="" width="28" height="28" />
                </span>
                <span class="infoContact__text">
                <span class="text-caption-c1 text-secondary d-block">Hubungi CS</span>
                <span class="text-body-b4 font-medium d-block">(021) 2994 0808</span>
                </span>
                <img src="src/assets/icons/arrow-top-right.svg" alt="" width="20" height="20" />
            </a>

            <!-- Email -->
            <a href="mailto:enterprise.inquiry@linknet.co.id" class="infoContact__item">
                <span class="infoContact__lead">
                <img class="infoContact__icon" src="src/assets/icons/mail.svg" alt="" width="28" height="28" />
                </span>
                <span class="infoContact__text">
                <span class="text-caption-c1 text-secondary d-block">Email</span>
                <span class="text-body-b4 font-medium d-block">enterprise.inquiry@linknet.co.id</span>
                </span>
                <img src="src/assets/icons/arrow-top-right.svg" alt="" width="20" height="20" />
            </a>
        </div>
    </div>

  </div>
</section>


    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
<script src="https://code.highcharts.com/maps/highmaps.js"></script>

    <script src="src/dev/script/main.js"></script>
    <script src="src/dev/script/componets/sliders.js"></script>
    <script src="src/dev/script/componets/sections.js"></script>
    <script src="src/dev/script/componets/map.js"></script>
    <script src="src/dev/script/componets/footer.js"></script>

    <script src="src/dev/script/main.js"></script>
    <script>
        // Enable tooltips (IDX info)
        const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
        tooltipTriggerList.map(el => new bootstrap.Tooltip(el));
    </script>

</body>

</html>
