<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Section Cat Article with Button</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap 5.3 CSS -->
  <link href="src/dev/3rd/bootstrap/bootstrap.css" rel="stylesheet">
  <link rel="stylesheet" href="src/dev/styles/main.css">
</head>

<body>

<section id="coverage-section" class="lnSection lnSection__coverage">
  <div class="container">

    <div class="lnSection--head">
        <div class="lnIntro">
            <div class="lnIntro__content">
                <div class="lnIntro__label text-caption-c1 font-bold">OPERATIONAL AREA</div>

                <div class="lnIntro__title text-headline-h2 font-bold">
                    Linknet continues to expand its reach to serve more cities in Indonesia
                </div>

                <div class="lnIntro__desc text-body-b4 font-regular">
                    Please click on one of the provinces
                </div>
            </div>

        </div>
    </div>

    <div id="coverage-container" class="coverage-container">
        <!-- Map wrapper (scroll-x on mobile) -->
        <div class="map-scroll">
            <div id="indo-map">
                <div class="map-hint">Klik salah satu provinsi pada peta</div>
            </div>
        </div>

        <!-- Widget -->
        <aside id="coverage-widget" class="card" aria-hidden="true">
        <div class="widget-head">
            <h3 class="text-body-b4 font-bold">Detail Coverage</h3>
            <button id="coverage-close" class="widget-close" aria-label="Close">
                <img src="src/assets/icons/close.svg" width="24" height="24" alt="Close">
            </button>
        </div>
        <p id="coverage-hint" class="muted">Klik provinsi pada peta untuk melihat detail.</p>
        <div id="coverage-detail" style="margin-top:8px;"></div>
        </aside>
    </div>
  </div>

  <!-- JSON: Business Units -->
  <script type="application/json" id="business_units">
    {
      "BU1": { "label": "Area", "title": "Sumatera", "cities": ["Medan","Batam","Palembang"] },
      "BU2": { "label": "Area", "title": "Jakarta", "cities": ["Jabo 1","Jabo 2","Jabo 3"] },
      "BU3": { "label": "Area", "title": "West Java", "cities": ["Bandung","Cirebon","Cikampek","Purwakarta","Subang","Sukabumi","Sumedang","Cianjur","Ciamis","Kuningan","Indramayu"] },
      "BU4": { "label": "Area", "title": "Central Java", "cities": ["Semarang","Yogyakarta","Solo","Tegal","Purwokerto","Pemalang","Mojokerto","Demak","Pati","Banyumas","Magelang","Purbalingga","Brebes","Cilacap"] },
      "BU5": { "label": "Area", "title": "East Java & Bali", "cities": ["Surabaya","Gresik","Sidoarjo","Malang","Kediri","Madiun","Bali","Bojonegoro","Tulungagung","Probolinggo","Ponorogo"] }
    }
  </script>

  <!-- JSON: Mapping hc-key provinsi → BU -->
  <script type="application/json" id="province_bu_map">
    {
      "id-su": "BU1",
      "id-kr": "BU1",
      "id-sl": "BU1",
      "id-jk": "BU2",
      "id-jr": "BU3",
      "id-jt": "BU4",
      "id-yo": "BU4",
      "id-ji": "BU5",
      "id-ba": "BU5"
    }
  </script>
</section>


    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
<script src="https://code.highcharts.com/maps/highmaps.js"></script>

    <script src="src/dev/script/main.js"></script>
    <script src="src/dev/script/componets/sliders.js"></script>
    <script src="src/dev/script/componets/sections.js"></script>
    <script src="src/dev/script/componets/map.js"></script>
    <script src="src/dev/script/componets/footer.js"></script>

    <script src="src/dev/script/main.js"></script>
    <script>
        // Enable tooltips (IDX info)
        const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
        tooltipTriggerList.map(el => new bootstrap.Tooltip(el));
    </script>

</body>

</html>
