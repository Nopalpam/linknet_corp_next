<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Section Cat Article with Button</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap 5.3 CSS -->
  <link href="src/dev/3rd/bootstrap/bootstrap.css" rel="stylesheet">
   <link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
/>
  <link rel="stylesheet" href="src/dev/styles/main.css">
</head>

<body>

<section class="lnSection__hero" id="lnSection__hero">
    <div class="p-2">
        <div class="lnHero lnHero--parallax" data-parallax="0.25" aria-label="Our Vision">
            <div class="lnHero__media" aria-hidden="true">
                <!-- BG via <img>, bukan background-image -->
                <img src="src/assets/bg/top-view-business-people-writing-mind-map-while-brainstorm-idea-convocation.jpg" alt="" />
            </div>
            <div class="lnHero__gradient" aria-hidden="true"></div>

            <div class="lnHero__content">
                <div class="lnHero__text">
                    <span class="lnHero__pill text-caption-c1 font-medium mb-2">Life at Linknet</span>

                    <h1 class="lnHero__title text-headline-h2 font-bold">
                        Let's Discover the Possibilities Together!
                    </h1>

                    <p class="lnHero__desc text-body-b4 font-regular w-75">
                        We believe in your potential. This is the right time for you to step up your skills and discover endless possibilities.
                    </p>
                </div>

                <div class="lnHero__actions">
                    <!-- CTA pakai sistem tombol kamu -->
                    <a class="btn btn-lg btn-secondary-outline-reverse with-icon with-icon-end" href="#" aria-label="Get to Know Us">
                        <span>Get to Know Us</span>
                        <span class="icon icon--24" style="--icon-src: url('../../../src/assets/icons/arrow-top-right.svg')" aria-hidden="true"></span>
                    </a>
                </div>
            </div>

        </div>
    </div>
</section>

    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
<script src="https://code.highcharts.com/maps/highmaps.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>

    <script src="src/dev/script/main.js"></script>
    <script src="src/dev/script/componets/sliders.js"></script>
    <script src="src/dev/script/componets/sections.js"></script>
    <script src="src/dev/script/componets/modals.js"></script>
    <script src="src/dev/script/componets/map.js"></script>
    <script src="src/dev/script/componets/footer.js"></script>

    <script src="src/dev/script/main.js"></script>
    <script>
        // Enable tooltips (IDX info)
        const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
        tooltipTriggerList.map(el => new bootstrap.Tooltip(el));
    </script>

</body>

</html>
