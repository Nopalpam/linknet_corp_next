trigger:
- develop

pool:
  vmImage: ubuntu-latest

variables:
  tag: 'cms-$(Build.BuildId)'
  Uri: '329599622292.dkr.ecr.ap-southeast-3.amazonaws.com'
  RepositoryName: 'linknet/corporate-cms'
  awsCredentials: 'aws-iam-system-azure-devops-holdco-dev-corporate'

steps:
- checkout: self

# 1. NODE SETUP (NEXT.JS SAFE)
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js (Next.js compatible)'

# 2. CODEQL INIT
- task: AdvancedSecurity-CodeQL-Init@1
  displayName: 'CodeQL Init'
  inputs:
    languages: 'javascript'

# 3. SECURE DEP INSTALL
- script: |
    node -v
    npm -v
    npm ci
  displayName: 'Install Dependencies (deterministic)'

# 4. DEPENDENCY SCAN
- task: AdvancedSecurity-Dependency-Scanning@1
  displayName: 'GHAS Dependency Scanning'

# 4A. NPM Audit
#- script: |
#    echo "Running npm audit..."
#    npm audit --audit-level=high || true
#    npm audit --json > audit-report.json
#  displayName: 'NPM Audit'

# 5. LINT (NON BLOCKING)
- script: npm run lint || true
  displayName: 'ESLint (Non-blocking)'

# 6. BUILD NEXT.JS
- script: npm run build
  displayName: 'Build Next.js'

# VALIDASI NEXT OUTPUT
- script: |
    if [ ! -d ".next" ]; then
      echo "❌ .next folder missing - build invalid"
      exit 1
    fi
  displayName: 'Validate Next.js Build Output'

# 6A. NEXT.JS SECURITY CHECK (RUNTIME RISK)
- script: |
    echo "Checking for dangerous patterns..."

    # Detect potential XSS vector
    grep -r "dangerouslySetInnerHTML" . && echo "⚠️ XSS Risk found" || echo "✅ No direct XSS pattern"

    # Detect eval usage
    grep -r "eval(" . && echo "⚠️ Eval usage detected" || echo "✅ No eval usage"

    # Detect direct window usage (SSR risk)
    grep -r "window." . && echo "⚠️ Potential SSR unsafe usage" || true

  displayName: 'Next.js Runtime Security Check'


# 6B. NEXT.JS CONFIG SECURITY CHECK
- script: |
    echo "Checking Next.js security config..."

    if grep -q "Content-Security-Policy" next.config.*; then
      echo "✅ CSP configured"
    else
      echo "⚠️ CSP header not found"
    fi

  displayName: 'Next.js Security Config Check'

# 7. CODEQL ANALYZE
- task: AdvancedSecurity-CodeQL-Analyze@1
  displayName: 'CodeQL Analyze'

# 8. SBOM (SUPPLY CHAIN VISIBILITY)
- script: |
    npx @cyclonedx/cyclonedx-npm --output-file sbom-corporate-cms-dev.json
  displayName: 'Generate SBOM'

# 9. INSTALL TRIVY
- script: |
    sudo apt-get update
    sudo apt-get install wget apt-transport-https gnupg lsb-release -y
    wget -qO - https://aquasecurity.github.io/trivy-repo/dabest.gpg | sudo apt-key add -
    echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
    sudo apt-get update
    sudo apt-get install trivy -y
  displayName: 'Install Trivy'

# 10. FILE SYSTEM SCAN (WITH GATING)
- script: |
    trivy fs \
      --scanners vuln,secret \
      --severity LOW,MEDIUM,HIGH,CRITICAL \
      .
  displayName: 'Trivy FS Scan'

# 11. BUILD DOCKER
- task: Docker@2
  displayName: 'Build Docker Image'
  inputs:
    command: build
    Dockerfile: $(System.DefaultWorkingDirectory)/Dockerfile
    buildContext: $(System.DefaultWorkingDirectory)
    repository: $(Uri)/$(RepositoryName)
    tags: |
      $(tag)

# 12. IMAGE SCAN
- script: |
    trivy image \
      --severity LOW,MEDIUM,HIGH,CRITICAL \
      $(Uri)/$(RepositoryName):$(tag)
  displayName: 'Trivy Image Scan'

# 13. PUSH IMAGE
- task: ECRPushImage@1
  displayName: 'Push Docker Image'
  condition: succeeded()
  inputs:
    awsCredentials: $(awsCredentials)
    regionName: ap-southeast-3
    imageSource: 'imagename'
    sourceImageName: $(Uri)/$(RepositoryName)
    sourceImageTag: $(tag)
    pushTag: $(tag)
    repositoryName: $(RepositoryName)
    autoCreateRepository: true

# 14. SECURITY ARTIFACT
- script: |
    mkdir -p $(Build.ArtifactStagingDirectory)
    cp sbom-corporate-cms-dev.json $(Build.ArtifactStagingDirectory)/ || true
  displayName: 'Stage Security Artifacts'

# 15. MSDO SCAN
- task: MicrosoftSecurityDevOps@1
  condition: always()
  displayName: 'Microsoft Security DevOps'
  inputs:
    command: 'run'
    policy: 'azuredevops'
    categories: 'all'
    languages: 'javascript'
    publish: true
    artifactName: 'CodeAnalysisLogs'

# 16. PUBLISH ARTIFACTS
- task: PublishBuildArtifacts@1
  displayName: 'Publish Security Artifacts'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    artifactName: 'security-reports'