apiVersion: v1
kind: Namespace
metadata:
  name: linknet-corp

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: linknetcorp-backend
  namespace: linknet-corp
  labels:
    app: linknetcorp-backend
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: linknetcorp-backend
  template:
    metadata:
      labels:
        app: linknetcorp-backend
        tier: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: backend
        image: <YOUR_ACR_NAME>.azurecr.io/linknetcorp-backend:<IMAGE_TAG>
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: app-logs
          mountPath: /app/logs
        - name: app-uploads
          mountPath: /app/uploads
        
        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: linknetcorp-backend-config
        
        # Sensitive data from Azure Key Vault via CSI driver
        # Or from Kubernetes Secrets
        env:
        - name: PORT
          value: "5000"
        - name: RATE_LIMIT_WINDOW_MS
          value: "900000"
        - name: RATE_LIMIT_MAX_REQUESTS
          value: "100"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: linknetcorp-backend-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: linknetcorp-backend-secrets
              key: jwt-secret
        - name: JWT_REFRESH_SECRET
          valueFrom:
            secretKeyRef:
              name: linknetcorp-backend-secrets
              key: jwt-refresh-secret
        
        # Azure Key Vault integration (using Managed Identity)
        - name: AZURE_KEY_VAULT_URL
          value: "https://<YOUR_VAULT_NAME>.vault.azure.net/"
        
        # Resource limits
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        # Liveness probe - checks if container is alive
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        
        # Readiness probe - checks if container is ready to serve traffic
        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Startup probe - checks if application has started
        startupProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30

      volumes:
      - name: tmp
        emptyDir: {}
      - name: app-logs
        emptyDir: {}
      - name: app-uploads
        emptyDir: {}
      
      # Use Azure Managed Identity for pod
      # Requires Azure AD Pod Identity or Workload Identity
      # serviceAccountName: linknetcorp-backend-sa

---
apiVersion: v1
kind: Service
metadata:
  name: linknetcorp-backend-service
  namespace: linknet-corp
  labels:
    app: linknetcorp-backend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 5000
    protocol: TCP
    name: http
  selector:
    app: linknetcorp-backend

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: linknetcorp-backend-config
  namespace: linknet-corp
data:
  NODE_ENV: "production"
  API_PREFIX: "/api/v1"
  API_VERSION: "1.0.0"
  CORS_ORIGIN: "https://your-frontend-domain.com"
  CORS_CREDENTIALS: "true"
  FORCE_HTTPS: "true"
  FORCE_HTTPS_ALLOWED_HOSTS: "api.example.com"
  ALLOWED_REDIRECT_HOSTS: "https://your-frontend-domain.com"
  AUTH_COOKIE_DOMAIN: ".example.com"
  ENABLE_FILE_LOGS: "false"
  AUTO_DISABLE_DORMANT_USERS: "true"
  DORMANT_USER_DISABLE_DAYS: "30"

---
# Note: In production, use Azure Key Vault with CSI driver
# This is a template for Kubernetes secrets (base64 encoded)
apiVersion: v1
kind: Secret
metadata:
  name: linknetcorp-backend-secrets
  namespace: linknet-corp
immutable: true
type: Opaque
data:
  # These are examples - replace with actual base64 encoded values
  # echo -n "your-database-url" | base64
  database-url: <BASE64_ENCODED_DATABASE_URL>
  jwt-secret: <BASE64_ENCODED_JWT_SECRET>
  jwt-refresh-secret: <BASE64_ENCODED_JWT_REFRESH_SECRET>

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: linknetcorp-backend-hpa
  namespace: linknet-corp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: linknetcorp-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
