# ========================================
# Azure Pipeline - Next.js SSR/Hybrid Build
# ========================================
# Pipeline ini melakukan build aplikasi Next.js dalam mode SSR/hybrid
# Artifact yang dihasilkan dapat di-deploy ke Azure App Service atau platform yang mendukung Next.js
# 
# Alur:
# 1. Install Node.js
# 2. Cache npm dependencies untuk mempercepat build berikutnya
# 3. Install dependencies
# 4. Build Next.js (output di folder .next/)
# 5. Publish artifact

# Trigger pipeline saat ada push ke branch main
trigger:
  branches:
    include:
      - main

# Gunakan Azure Pipelines hosted agent dengan Ubuntu (lebih cepat untuk Node.js builds)
pool:
  vmImage: 'ubuntu-latest'

# Variabel yang digunakan dalam pipeline
variables:
  nodeVersion: '20.x'  # Node.js LTS - bisa diubah ke 18.x jika diperlukan
  npmCacheFolder: $(Pipeline.Workspace)/.npm
  artifactName: 'nextjs-build'

# ========================================
# Build Stage
# ========================================
stages:
  - stage: Build
    displayName: 'Build & Deploy Next.js App'
    jobs:
      - job: BuildJob
        displayName: 'Build Next.js App'
        steps:
          # Step 1: Setup Node.js
          - task: NodeTool@0
            displayName: 'Install Node.js $(nodeVersion)'
            inputs:
              versionSpec: '$(nodeVersion)'

          # Step 2: Cache npm dependencies
          # Cache akan mempercepat pipeline dengan menyimpan node_modules
          - task: Cache@2
            displayName: 'Cache npm dependencies'
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(npmCacheFolder)

          # Step 3: Install dependencies
          - script: |
              npm config set cache $(npmCacheFolder) --global
              npm ci
            displayName: 'Install dependencies (npm ci)'
            # Gunakan npm ci (bukan npm install) untuk instalasi yang lebih cepat dan konsisten

          # Step 4: Build Next.js app (SSR/Hybrid mode)
          # Output akan berada di folder .next/
          - script: |
              npm run build
            displayName: 'Build Next.js app'
            env:
              NODE_ENV: production
              # Tambahkan environment variables lain jika diperlukan, contoh:
              # NEXT_PUBLIC_API_URL: $(API_URL)

          # Step 5: Verifikasi output folder
          - script: |
              if [ ! -d ".next" ]; then
                echo "Error: '.next' folder not found!"
                echo "Build may have failed."
                exit 1
              fi
              echo "Contents of .next folder:"
              ls -la .next/
            displayName: 'Verify output folder'

          # Step 7: Publish artifact
          # Folder .next dan file yang diperlukan akan di-publish sebagai artifact
          - task: PublishBuildArtifacts@1
            displayName: 'Publish build artifact'
            inputs:
              PathtoPublish: '$(Build.SourcesDirectory)'
              ArtifactName: '$(artifactName)'
              publishLocation: 'Container'
            # Gunakan .artifactignore untuk memfilter file yang dipublish

          # Step 8: Display artifact info
          - script: |
              echo "✅ Build completed successfully!"
              echo "📦 Artifact name: $(artifactName)"
              echo "📁 Artifact contains Next.js SSR build from: .next/"
              echo ""
              echo "Next steps:"
              echo "1. Deploy to Azure App Service or platform yang mendukung Next.js"
              echo "2. Jalankan 'npm run start' untuk menjalankan server"
            displayName: 'Display build summary'