trigger:
  branches:
    include:
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  nodeVersion: '22.x'
  appDirectory: 'web'
  npmCacheFolder: $(Pipeline.Workspace)/.npm
  tag: '$(Build.BuildId)'
  awsRegion: 'ap-southeast-3'
  ecrRegistry: '207567776092.dkr.ecr.ap-southeast-3.amazonaws.com'
  repositoryName: 'onestreamcoid/onestream'
  awsCredentials: 'aws-iam-system-azure-devops-mediaco-ecr-dev-onestream'

steps:
  - task: NodeTool@0
    displayName: 'Install Node.js $(nodeVersion)'
    inputs:
      versionSpec: '$(nodeVersion)'

  - task: Cache@2
    displayName: 'Cache npm dependencies'
    inputs:
      key: 'npm | "$(Agent.OS)" | $(appDirectory)/package-lock.json'
      restoreKeys: |
        npm | "$(Agent.OS)"
      path: $(npmCacheFolder)

  - script: |
      npm config set cache $(npmCacheFolder) --global
      npm ci
    displayName: 'Install dependencies (npm ci)'
    workingDirectory: '$(Build.SourcesDirectory)/$(appDirectory)'

  - script: |
      npm run lint
    displayName: 'Lint web app'
    workingDirectory: '$(Build.SourcesDirectory)/$(appDirectory)'

  - script: |
      npm run build
    displayName: 'Build Next.js app'
    workingDirectory: '$(Build.SourcesDirectory)/$(appDirectory)'
    env:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: '1'

  - task: Docker@2
    displayName: 'Build Docker image'
    inputs:
      command: build
      Dockerfile: '$(Build.SourcesDirectory)/$(appDirectory)/Dockerfile'
      buildContext: '$(Build.SourcesDirectory)/$(appDirectory)'
      repository: '$(ecrRegistry)/$(repositoryName)'
      tags: |
        $(tag)

  - task: MicrosoftSecurityDevOps@1
    displayName: 'Container Scan (Trivy)'
    env:
      GDN_TRIVY_IMAGE: $(ecrRegistry)/$(repositoryName):$(tag)
    inputs:
      command: 'run'
      categories: 'artifacts'
      tools: 'trivy'
      break: true

  - task: ECRPushImage@1
    displayName: 'Push image to ECR'
    inputs:
      awsCredentials: $(awsCredentials)
      regionName: $(awsRegion)
      imageSource: 'imagename'
      sourceImageName: $(ecrRegistry)/$(repositoryName)
      sourceImageTag: $(tag)
      pushTag: $(tag)
      repositoryName: $(repositoryName)
