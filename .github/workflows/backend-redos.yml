name: Backend ReDoS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unsafe-regex:
    name: Backend unsafe regex
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js with npm cache
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: corporate-be/package-lock.json

      - name: Install dependencies without lifecycle scripts
        working-directory: corporate-be
        run: npm ci --ignore-scripts --no-audit --fund=false

      - name: Check unsafe regular expressions
        working-directory: corporate-be
        run: npm run lint:redos
