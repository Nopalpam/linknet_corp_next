name: Trivy Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Jalankan setiap hari Senin pukul 07:00 UTC untuk deteksi CVE baru
    - cron: '0 7 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan-backend:
    name: Scan Backend (filesystem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy — Backend
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: ./backend
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: table

  scan-frontend:
    name: Scan Frontend (filesystem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy — Frontend
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: ./frontend
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: table

  scan-web:
    name: Scan Web (filesystem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy — Web
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: ./web
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: table

  scan-filemanager:
    name: Scan Filemanager (filesystem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy — Filemanager
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: ./filemanager
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: table
