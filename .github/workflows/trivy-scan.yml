name: Trivy Scan

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '.github/workflows/**'
      - 'backend/**'
      - 'frontend/**'
      - 'web/**'
      - 'filemanager/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '.github/workflows/**'
      - 'backend/**'
      - 'frontend/**'
      - 'web/**'
      - 'filemanager/**'
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

env:
  TRIVY_EXIT_CODE: ${{ github.event_name == 'schedule' && '0' || '1' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  filesystem:
    name: Filesystem ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Backend
            scan-ref: ./backend
            sarif: trivy-backend.sarif
          - name: CMS Frontend
            scan-ref: ./frontend
            sarif: trivy-frontend.sarif
          - name: Public Web
            scan-ref: ./web
            sarif: trivy-web.sarif
          - name: Filemanager
            scan-ref: ./filemanager
            sarif: trivy-filemanager.sarif

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ matrix.scan-ref }}
          scanners: vuln,secret,misconfig,license
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: ${{ env.TRIVY_EXIT_CODE }}
          format: sarif
          output: ${{ matrix.sarif }}

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ matrix.sarif }}

  config:
    name: IaC and repository config
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: ${{ env.TRIVY_EXIT_CODE }}
          format: table
          skip-dirs: app_docs,web_reference_only,node_modules,backend/dist,backend/logs,frontend/.next,web/.next,filemanager/dist

  container:
    name: Container ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Backend
            app: backend
            image: linknet/backend:${{ github.sha }}
          - name: CMS Frontend
            app: frontend
            image: linknet/frontend:${{ github.sha }}
          - name: Public Web
            app: web
            image: linknet/web:${{ github.sha }}
          - name: Filemanager
            app: filemanager
            image: linknet/filemanager:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t "${{ matrix.image }}" "${{ matrix.app }}"

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: ${{ env.TRIVY_EXIT_CODE }}
          format: table
