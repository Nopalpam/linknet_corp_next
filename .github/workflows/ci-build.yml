name: General CI

on:
  push:
    branches:
      - main
      - develop
      - 'backend/**'
      - 'frontend/**'
      - 'web/**'
      - 'filemanager/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-ci:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Backend API
            app: backend
            lockfile: backend/package-lock.json
            prisma: true
          - name: CMS Frontend
            app: frontend
            lockfile: frontend/package-lock.json
            prisma: false
          - name: Public Web
            app: web
            lockfile: web/package-lock.json
            prisma: false
          - name: Filemanager
            app: filemanager
            lockfile: filemanager/package-lock.json
            prisma: false

    defaults:
      run:
        working-directory: ${{ matrix.app }}

    env:
      CI: true
      NODE_ENV: test
      NEXT_TELEMETRY_DISABLED: '1'
      NEXT_PUBLIC_AUTH_ENABLED: 'true'
      NEXT_PUBLIC_API_URL: http://127.0.0.1:5000/api/v1
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3001
      DATABASE_URL: postgresql://ci_user@127.0.0.1:5432/linknet_ci?schema=public
      JWT_ACCESS_SECRET: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      JWT_REFRESH_SECRET: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
      FILEMANAGER_INTERNAL_URL: http://127.0.0.1:3000
      FILEMANAGER_API_KEY: cccccccccccccccccccccccccccccccc
      LINKNET_MEDIA_TOKEN_SALT: dddddddddddddddddddddddddddddddd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ matrix.lockfile }}

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        if: matrix.prisma == true
        run: npx prisma generate

      - name: Lint
        continue-on-error: true
        run: npm run lint --if-present

      - name: Test
        continue-on-error: true
        run: npm test --if-present -- --runInBand

      - name: Build
        env:
          NODE_ENV: production
        run: npm run build --if-present
