name: Security Scan

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '.github/workflows/**'
      - 'backend/**'
      - 'frontend/**'
      - 'web/**'
      - 'filemanager/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '.github/workflows/**'
      - 'backend/**'
      - 'frontend/**'
      - 'web/**'
      - 'filemanager/**'
  schedule:
    - cron: '30 7 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    name: npm audit ${{ matrix.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        app:
          - backend
          - frontend
          - web
          - filemanager

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependency graph
        working-directory: ${{ matrix.app }}
        run: npm ci --ignore-scripts

      - name: Audit high and critical vulnerabilities
        working-directory: ${{ matrix.app }}
        run: npm audit --audit-level=high

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          license-check: true

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - name: Analyze
        uses: github/codeql-action/analyze@v3
