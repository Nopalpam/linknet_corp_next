name: npm audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - name: Backend
            directory: corporate-be
          - name: CMS
            directory: corporate-cms
          - name: Web
            directory: corporate-web
          - name: File Manager
            directory: corporate-fm

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js with npm cache
        if: ${{ hashFiles(format('{0}/package-lock.json', matrix.directory)) != '' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ matrix.directory }}/package-lock.json

      - name: Set up Node.js without npm cache
        if: ${{ hashFiles(format('{0}/package-lock.json', matrix.directory)) == '' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Install dependency graph without lifecycle scripts
        working-directory: ${{ matrix.directory }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package-lock.json ]]; then
            npm ci --ignore-scripts --no-audit --fund=false
          else
            npm install --ignore-scripts --no-audit --fund=false
          fi

      - name: Audit high and critical vulnerabilities
        working-directory: ${{ matrix.directory }}
        run: npm audit --audit-level=high
